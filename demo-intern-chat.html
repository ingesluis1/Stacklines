<!DOCTYPE html>
<html lang="nl">
<head>
  <!-- Google tag (gtag.js), alleen laden bij direct openen, niet in een iframe van de hub/demo -->
  <script>
    if (window.self === window.top) {
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { dataLayer.push(arguments); };
      gtag('js', new Date());
      gtag('config', 'G-XLMX1V0H4B');
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-XLMX1V0H4B';
      document.head.appendChild(s);
    }
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teamassistent (demo) | Stacklines</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" />
  <style>
    :root {
      --chat--color-primary: #f97316;
      --chat--color-primary-shade-50: #ea6a0c;
      --chat--color-primary-shade-100: #d95f08;
      --chat--color-secondary: #2a1612;
      --chat--color-secondary-shade-50: #1a0d0a;
      --chat--border-radius: 12px;
      --chat--font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --chat--header--background: #2a1612;
      --chat--header--color: #f5e6d3;
      --chat--heading--font-size: 1.1rem;
      --chat--subtitle--font-size: .85rem;
      --chat--message--font-size: .95rem;
      --chat--message--user--background: #f97316;
      --chat--message--user--color: #ffffff;
      --chat--message--bot--background: #fff4e6;
      --chat--message--bot--color: #1a1f2c;
      --chat--color-typing: #c2592a;
      --chat--textarea--height: 52px;
    }
    html, body { height: 100%; margin: 0; background: #fff; }
    #n8n-chat { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .sl-demo-banner { display: none; gap: .25rem .6rem; align-items: center; justify-content: center; flex-wrap: wrap; text-align: center; background: #2a1612; color: #f5e6d3; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: .82rem; line-height: 1.35; padding: .6rem 1rem; }
    .sl-demo-banner strong { color: #fff; }
    .sl-demo-banner a { color: #fdba74; font-weight: 600; text-decoration: none; }
    .sl-demo-banner a:hover { text-decoration: underline; }
    body.has-banner { display: flex; flex-direction: column; }
    body.has-banner .sl-demo-banner { display: flex; }
    body.has-banner #n8n-chat { flex: 1 1 auto; height: auto; min-height: 0; }
  </style>
</head>
<body>
  <div class="sl-demo-banner">
    <span>Demo van <strong>Stacklines</strong>. &ldquo;De Groene Stuiver&rdquo; is een fictief voorbeeldbedrijf.</span>
    <a href="https://stacklines.nl/">stacklines.nl</a>
  </div>
  <script>
    /* Toon de demo-balk alleen als de pagina direct wordt geopend (niet in de iframe van de hub/demo). */
    if (window.self === window.top) document.body.classList.add('has-banner');
  </script>
  <div id="n8n-chat"></div>
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
    createChat({
      webhookUrl: 'https://n8n.stacklines.nl/webhook/2338aaba-1b43-458a-8aeb-5ece0782ef56/chat',
      mode: 'fullscreen',
      target: '#n8n-chat',
      showWelcomeScreen: false,
      initialMessages: [
        'Hoi! Ik ben de interne teamassistent van De Groene Stuiver.',
        'Stel gerust een vraag over werkwijzen, HR of beleid, bijvoorbeeld: "Hoe handel ik een retourverzoek af?" of "Hoeveel verlofdagen heb ik nog?" (voor deze demo ben je ingelogd als Sanne de Vries).'
      ],
      i18n: {
        en: {
          title: 'De Groene Stuiver teamassistent',
          subtitle: 'Voor medewerkers — werkwijzen, HR en beleid',
          footer: '',
          getStarted: 'Nieuw gesprek',
          inputPlaceholder: 'Stel je vraag...',
          closeButtonTooltip: 'Sluiten'
        }
      }
    });
  </script>
</body>
</html>
